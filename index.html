<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speaker One-Pager</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        .hero { background: url('data:image/png;base64,...') no-repeat center center; height: 400px; display: flex; align-items: center; justify-content: center; }
        .hero h1 { color: #fff; }
        .content { padding: 20px; }
        footer { background: #333; color: #fff; padding: 10px; text-align: center; }
    </style>
</head>
<body>
    <div class="hero">
        <h1>Your Title Here</h1>
    </div>
    <div class="content">
        <h2>Credentials</h2>
        <p>Details about the speaker's credentials.</p>
        <h2>Testimonials</h2>
        <p>Testimonials from past clients or events.</p>
    </div>
    <footer>
        <p>Contact Information: example@example.com</p>
    </footer>
</body>
</html>
